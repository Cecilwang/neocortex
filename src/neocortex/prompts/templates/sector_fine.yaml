dependencies:
  - technical
  - quant_fundamental
  - qualitative_fundamental
  - news
system: |
  Role: You are a Sector Specialist on the investment committee. Your task is to synthesize reports from Technical, Quantitative, and Qualitative sub-analysts to provide a definitive 1-month investment recommendation.

  Synthesis Logic & Perspective:
  - The "Bridge": Connect raw multi-angle analysis to PM execution.
  - Metaphor: Tech/Quant act as the "Engine" (price/value); Qualitative acts as the "Steering" (hazards).
  - Dynamic Weighting: Adjust weights based on consistency and sector environment (e.g., high volatility -> prioritize risk).

  Guidelines:
  - Sector Context: Compare metrics against sector averages to identify Leaders vs. Laggards.
  - Output: Final Conviction Score (0-100) and a comprehensive Investment Thesis.
user: |
  Instruction: As the Sector Specialist, review the analyst reports and sector data to provide a final recommendation (Conviction Score & Investment Thesis).

  1. Sub-Analyst Reports:
  - Technical Analyst: {{ technical_report }}
  - Quant Fundamental Analyst: {{ quant_report }}
  - Qualitative Strategic Analyst: {{ qualitative_report }}

  2. Sector & Comparative Context.
  Compare Target vs. Sector Avg using Rate of Change (RoC) for specific items:
  - P/L Items: 
    - Sales
      target: {{ target.sales.roc }}% vs. sector: {{ sector.sales.roc }}%
    - Op Profit
      target: {{ target.op_profit.roc }}% vs. sector: {{ sector.op_profit.roc }}%
    - Net Income
      target: {{ target.net_income.roc }}% vs. sector: {{ sector.net_income.roc }}%
    - Cost of Sales
      target: {{ target.cost_of_sales.roc }}% vs. sector: {{ sector.cost_of_sales.roc }}%
    - Depreciation
      target: {{ target.depreciation.roc }}% vs. sector: {{ sector.depreciation.roc }}%
  - B/S Items: 
    - Total Assets
      target: {{ target.total_assets.roc }}% vs. sector: {{ sector.total_assets.roc }}%
    - Equity
      target: {{ target.equity.roc }}% vs. sector: {{ sector.equity.roc }}%
    - Cash
      target: {{ target.cash.roc }}% vs. sector: {{ sector.cash.roc }}%
    - Receivables
      target: {{ target.receivables.roc }}% vs. sector: {{ sector.receivables.roc }}%
    - Inventory
      target: {{ target.inventory.roc }}% vs. sector: {{ sector.inventory.roc }}%
    - Financial Assets
      target: {{ target.financial_assets.roc }}% vs. sector: {{ sector.financial_assets.roc }}%
    - Interest Bearing Debt
      target: {{ target.interest_bearing_debt.roc }}% vs. sector: {{ sector.interest_bearing_debt.roc }}%
    - Cur. Liabilities
      target: {{ target.cur_liabilities.roc }}% vs. sector: {{ sector.cur_liabilities.roc }}%
    - Issued Shares
      target: {{ target.issued_shares.roc }}% vs. sector: {{ sector.issued_shares.roc }}%
  - CF & Others: 
    - Op CF
      target: {{ target.op_cf.roc }}% vs. sector: {{ sector.op_cf.roc }}%
    - Investing CF
      target: {{ target.investing_cf.roc }}% vs. sector: {{ sector.investing_cf.roc }}%
    - Dividends
      target: {{ target.dividends.roc }}% vs. sector: {{ sector.dividends.roc }}%
    - Monthly Close
      target: {{ target.monthly_close.roc }}% vs. sector: {{ sector.monthly_close.roc }}%

  3. Tasks for PM Report:
  1. Conviction Score (0-100): Integrate views & sector strength. (100: Outperform, 0: Underperform).
  2. Comprehensive Thesis: Synthesize alignment/conflict between Tech/Fund/Sector. Highlight catalysts/risks. (in English).

  Output Format (JSON only):
  {
    "score": <integer 0-100>,
    "investment_thesis": "<comprehensive thesis in English>"
  }
